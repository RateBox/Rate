version: '3.8'

services:
  rate-postgres:
    image: postgres:15-alpine
    container_name: rate-postgres
    env_file:
      - ./strapi/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rate-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rate-strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
      target: development
    container_name: rate-strapi
    env_file:
      - ./strapi/.env
    volumes:
      - ./strapi:/opt/app
      - strapi_node_modules:/opt/app/node_modules
    ports:
      - "1337:1337"
    depends_on:
      rate-postgres:
        condition: service_healthy
    networks:
      - rate-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/admin"]
      interval: 30s
      timeout: 10s
      retries: 3

  rate-next:
    build:
      context: ./next
      dockerfile: Dockerfile
      target: development
    container_name: rate-next
    env_file:
      - ./next/.env
    volumes:
      - ./next:/opt/app
      - next_node_modules:/opt/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      rate-strapi:
        condition: service_healthy
    networks:
      - rate-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  rate-network:
    name: ratebox_rate-network

volumes:
  postgres_data:
  strapi_node_modules:
  next_node_modules:
