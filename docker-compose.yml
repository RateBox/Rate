services:
  rate-postgres:
    image: postgres:latest
    container_name: rate-postgres
    restart: always
    environment:
      POSTGRES_USER: joy
      POSTGRES_PASSWORD: rate@123!
      POSTGRES_DB: rate
    ports:
      - "5432:5432"
    volumes:
      - rate_pgdata:/var/lib/postgresql/data

  rate-strapi:
    build: ./strapi
    container_name: rate-strapi
    restart: always
    depends_on:
      - rate-postgres
    ports:
      - "1337:1337"
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: rate-postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: rate
      DATABASE_USERNAME: joy
      DATABASE_PASSWORD: rate@123!
      API_TOKEN_SALT: tobemodified
    volumes:
      - ./strapi/config:/opt/app/config
      - ./strapi/src:/opt/app/src
      - ./strapi/package.json:/opt/app/package.json
      - ./strapi/yarn.lock:/opt/app/yarn.lock
      - ./strapi/.env:/opt/app/.env

  rate-next:
    build: ./next
    container_name: rate-next
    restart: always
    depends_on:
      - rate-strapi
    ports:
      - "3001:3001"
    volumes:
      - ./next/src:/opt/app/src
      - ./next/public:/opt/app/public
      - ./next/package.json:/opt/app/package.json
      - ./next/yarn.lock:/opt/app/yarn.lock
      - ./next/.env:/opt/app/.env

volumes:
  rate_pgdata:
